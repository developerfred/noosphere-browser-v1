name: Build and Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: false
        default: 'all'

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x86
            target: x86_64-linux-gnu
            artifact: noosphere-x86_64-linux
          - runner: ubuntu-latest
            platform: linux-arm64
            target: aarch64-linux-gnu
            artifact: noosphere-aarch64-linux
          - runner: ubuntu-latest
            platform: linux-armv7
            target: armv7-linux-gnueabihf
            artifact: noosphere-armv7-linux
          - runner: macos-latest
            platform: macos-intel
            target: x86_64-apple-darwin
            artifact: noosphere-x86_64-macos
          - runner: macos-latest
            platform: macos-apple
            target: aarch64-apple-darwin
            artifact: noosphere-aarch64-macos
          - runner: windows-latest
            platform: windows
            target: x86_64-windows-gnu
            artifact: noosphere-x86_64-windows.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: korandoru/setup-zig@v1
        with:
          zig-version: 0.13.0

      - name: Build ${{ matrix.platform }}
        run: |
          zig build -freestanding -target ${{ matrix.target }} -O ReleaseFast
          mkdir -p release
          cp zig-out/bin/noosphere release/${{ matrix.artifact }}
          if [ '${{ matrix.platform }}' = 'windows' ]; then
            cp zig-out/bin/noosphere.exe release/${{ matrix.artifact }}
          fi
          ls -la release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: List files
        run: |
          ls -laR release/

      - name: Create checksums
        run: |
          cd release
          for f in noosphere-*; do
            sha256sum "$f" > "${f}.sha256"
          done
          cat *.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: release/**/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: release/**/*
          draft: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
