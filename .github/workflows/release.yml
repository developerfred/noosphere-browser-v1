name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: noosphere-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-linux
            artifact: noosphere-aarch64-linux
          - os: macos-latest
            target: x86_64-macos
            artifact: noosphere-x86_64-macos
          - os: macos-latest
            target: aarch64-macos
            artifact: noosphere-aarch64-macos
          - os: windows-latest
            target: x86_64-windows
            artifact: noosphere-x86_64-windows.exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        run: |
          # Download Zig
          if [ "${{ matrix.target }}" = "aarch64-linux" ]; then
            ZIG_URL="https://ziglang.org/download/0.13.0/zig-linux-aarch64-0.13.0.tar.xz"
          elif [ "${{ matrix.target }}" = "x86_64-linux" ]; then
            ZIG_URL="https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz"
          elif [ "${{ matrix.target }}" = "x86_64-macos" ]; then
            ZIG_URL="https://ziglang.org/download/0.13.0/zig-macos-x86_64-0.13.0.tar.xz"
          elif [ "${{ matrix.target }}" = "aarch64-macos" ]; then
            ZIG_URL="https://ziglang.org/download/0.13.0/zig-macos-aarch64-0.13.0.tar.xz"
          elif [ "${{ matrix.target }}" = "x86_64-windows" ]; then
            ZIG_URL="https://ziglang.org/download/0.13.0/zig-windows-x86_64-0.13.0.zip"
          fi
          
          echo "Downloading Zig from $ZIG_URL"
          curl -L "$ZIG_URL" -o /tmp/zig.tar.xz
          
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            unzip -q /tmp/zig.tar.xz -d /tmp
            echo "C:\actions\zig\*" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          else
            tar -xf /tmp/zig.tar.xz -C /tmp
            echo "/tmp/zig-*/" >> $GITHUB_PATH
          fi

      - name: Build
        shell: bash
        run: |
          export PATH="/tmp/zig-0.13.0:$PATH"
          
          # Set target
          case "${{ matrix.target }}" in
            x86_64-linux)  TARGET="-Dtarget=native" ;;
            aarch64-linux) TARGET="-Dtarget=aarch64-linux-gnu" ;;
            x86_64-macos)  TARGET="-Dtarget=x86_64-macos-none" ;;
            aarch64-macos) TARGET="-Dtarget=aarch64-macos-none" ;;
            x86_64-windows) TARGET="-Dtarget=x86_64-windows-gnu" ;;
          esac
          
          # Build with C fallback (faster, no Zig needed for basic build)
          if command -v zig &> /dev/null; then
            zig build $TARGET -Drelease-safe=true -Dstrip=true -p release
          else
            # Use C fallback
            gcc -O2 -o ${{ matrix.artifact }} c/main.c
          fi

      - name: Prepare artifact
        shell: bash
        run: |
          if [ -d "release/" ]; then
            cp release/noosphere ${{ matrix.artifact }} 2>/dev/null || true
          fi
          
          # Check if binary exists
          if [ -f "${{ matrix.artifact }}" ]; then
            echo "Binary size: $(du -h ${{ matrix.artifact }} | cut -f1)"
            echo "Binary created successfully"
          else
            echo "Warning: Binary not found, using C fallback"
            gcc -O2 -o ${{ matrix.artifact }} c/main.c
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -la artifacts/

      - name: Create checksums
        run: |
          cd artifacts
          for f in *; do
            sha256sum "$f" > "$f.sha256"
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-universal:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          # Simple C fallback for now
          gcc -O2 -o noosphere-universal c/main.c
          echo "Built universal binary"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: noosphere-universal
          path: noosphere-universal
