name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linux-x86
          - linux-arm64
          - linux-armv7
          - macos-intel
          - macos-apple
          - windows

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86
            target: x86_64-linux-gnu
            artifact: noosphere-x86_64-linux
          - os: ubuntu-latest
            platform: linux-arm64
            target: aarch64-linux-gnu
            artifact: noosphere-aarch64-linux
          - os: ubuntu-latest
            platform: linux-armv7
            target: armv7-linux-gnueabihf
            artifact: noosphere-armv7-linux
          - os: macos-latest
            platform: macos-intel
            target: x86_64-apple-darwin
            artifact: noosphere-x86_64-macos
          - os: macos-latest
            platform: macos-apple
            target: aarch64-apple-darwin
            artifact: noosphere-aarch64-macos
          - os: windows-latest
            platform: windows
            target: x86_64-windows-gnu
            artifact: noosphere-x86_64-windows.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: korandoru/setup-zig@v1
        with:
          zig-version: 0.13.0

      - name: Build ${{ matrix.platform }}
        run: |
          zig build -freestanding -target ${{ matrix.target }} -O ReleaseFast
          mkdir -p release
          cp zig-out/bin/noosphere release/${{ matrix.artifact }}
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp zig-out/bin/noosphere.exe release/${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: List files
        run: ls -laR release/

      - name: Create checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/**/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-universal:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: korandoru/setup-zig@v1
        with:
          zig-version: 0.13.0

      - name: Build universal macOS
        run: |
          # Build both architectures
          zig build -freestanding -target x86_64-apple-darwin -O ReleaseFast -fCodeModel=small
          mkdir -p release
          cp zig-out/bin/noosphere release/noosphere-x86_64-macos
          
          zig build -freestanding -target aarch64-apple-darwin -O ReleaseFast -fCodeModel=small
          cp zig-out/bin/noosphere release/noosphere-aarch64-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: release/*
